<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Lista - Empresas</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; max-width: 800px; margin: 0 auto 30px; }
        
        /* Barra de Busca */
        #busca {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            display: block;
            margin: 10px auto;
        }
        #busca:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(26,115,232,0.2); }

        /* Grid de Cards */
        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* Estilo do Card */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .card h3 { margin: 10px 0; color: var(--primary); font-size: 1.3em; }
        .card p { margin: 5px 0; color: #666; font-size: 0.9em; }

        .contador { color: #888; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Empresas CDA</h1>
        <p class="contador" id="contador">0 empresas encontradas</p>
        <input type="text" id="busca" placeholder="🔍 Buscar empresa ou setor..." onkeyup="filtrar()">
    </div>

    <div class="grid-empresas" id="lista-grid">
        </div>

    <script>
        // Dados atualizados com setor para busca inteligente
        const empresas = [
            { id: 'km-projetos', nome: 'KM PROJETOS', setor: 'Engenharia' },
            { id: 'mazz', nome: 'MAZZ', setor: 'Educação' },
            { id: 'mr-treinamentos', nome: 'MR TREINAMENTOS', setor: 'Educação' },
            { id: 'razgo', nome: 'RAZGO', setor: 'Tecnologia' }
        ];

        const grid = document.getElementById('lista-grid');
        const contadorDiv = document.getElementById('contador');

        function renderizarCards(dados) {
            grid.innerHTML = '';
            
            dados.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(emp => {
                const card = document.createElement('a');
                card.href = `empresa.html?id=${emp.id}`;
                card.className = 'card';
                card.innerHTML = `
                    <h3>${emp.nome}</h3>
                    <p><strong>${emp.setor}</strong></p>
                    <p>Clique para ver detalhes</p>
                `;
                grid.appendChild(card);
            });

            contadorDiv.innerText = `${dados.length} empresas cadastradas`;
        }

        function filtrar() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtradas = empresas.filter(emp => 
                emp.nome.toLowerCase().includes(termo) || 
                emp.setor.toLowerCase().includes(termo)
            );
            renderizarCards(filtradas);
        }

        // Inicia a página
        renderizarCards(empresas);
    </script>
</body>
</html>
